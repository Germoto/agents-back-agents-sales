name: Notify Infra Deploy (Agents Sales Back)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  notify-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch prod deploy in agents-sales-infra
        env:
          DISPATCH_TOKEN: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
        run: |
          set -Eeuo pipefail
          HTTP_CODE="$(curl -sS -o /tmp/dispatch-response.json -w '%{http_code}' \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/Germoto/agents-sales-infra/dispatches \
            -d '{"event_type":"agents-sales-back-updated","client_payload":{"environment":"prod","services":"sales-backend sales-frontend"}}')"
          test "$HTTP_CODE" = "204" || { cat /tmp/dispatch-response.json; exit 1; }
