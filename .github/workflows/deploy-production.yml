name: Deploy Production Backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      APP_DIR: ${{ secrets.DEPLOY_BACKEND_DIR || '/opt/deploy/app-stack/agents-sales/backend' }}
      COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE || '/opt/deploy/app-stack/docker-compose.yml' }}
      APP_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL || 'http://127.0.0.1:3202/api/bot/config?channel=whatsapp&account=ACCOUNT_WA_DEMO&phone=51999999999' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload backend bundle
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='uploads' \
            -czf /tmp/backend.tgz .
          scp -P "$SSH_PORT" /tmp/backend.tgz "$SSH_USER@$SSH_HOST:/tmp/backend.tgz"

      - name: Deploy backend over SSH
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -Eeuo pipefail; mkdir -p '$APP_DIR'; tar -xzf /tmp/backend.tgz -C '$APP_DIR'; docker compose -f '$COMPOSE_FILE' up -d --build sales-backend"

          for attempt in $(seq 1 12); do
            HTTP_CODE="$(ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "curl -sS -o /dev/null -w '%{http_code}' '$APP_URL' || true")"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "Healthcheck responded with HTTP $HTTP_CODE"
              exit 0
            fi
            sleep 5
          done

          echo 'Backend healthcheck did not respond in time'
          exit 1
