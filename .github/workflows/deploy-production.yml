name: Deploy Production Backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_DIR="${{ secrets.DEPLOY_BACKEND_DIR || '/opt/deploy/app-stack/agents-sales/backend' }}"
            COMPOSE_FILE="${{ secrets.DEPLOY_COMPOSE_FILE || '/opt/deploy/app-stack/docker-compose.yml' }}"
            APP_URL="${{ secrets.BACKEND_HEALTHCHECK_URL || 'http://127.0.0.1:3202/api/bot/config?channel=whatsapp&account=ACCOUNT_WA_DEMO&phone=51999999999' }}"
            REPO_URL="https://github.com/Germoto/agents-back-agents-sales.git"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            else
              git -C "$APP_DIR" fetch origin "$BRANCH"
              git -C "$APP_DIR" checkout "$BRANCH"
              git -C "$APP_DIR" reset --hard "origin/$BRANCH"
              git -C "$APP_DIR" clean -fd
            fi

            docker compose -f "$COMPOSE_FILE" up -d --build sales-backend

            for attempt in $(seq 1 12); do
              HTTP_CODE="$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL" || true)"
              if [ "$HTTP_CODE" != "000" ]; then
                echo "Healthcheck responded with HTTP $HTTP_CODE"
                exit 0
              fi
              sleep 5
            done

            echo 'Backend healthcheck did not respond in time'
            exit 1
