name: Deploy Production Backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Pack backend sources
        run: |
          mkdir -p .deploy-tmp
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='uploads' \
            --exclude='.deploy-tmp' \
            -czf .deploy-tmp/backend.tgz .

      - name: Upload backend bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: .deploy-tmp/backend.tgz
          target: /tmp/agents-sales-backend-deploy
          overwrite: true

      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_DIR="${{ secrets.DEPLOY_BACKEND_DIR || '/opt/apps/agents-sales/backend' }}"
            COMPOSE_FILE="${{ secrets.DEPLOY_COMPOSE_FILE || '/opt/deploy/app-stack/docker-compose.yml' }}"
            APP_URL="${{ secrets.BACKEND_HEALTHCHECK_URL || 'http://127.0.0.1:3202/api/bot/config?channel=whatsapp&account=ACCOUNT_WA_DEMO&phone=51999999999' }}"

            mkdir -p "$APP_DIR"
            tar -xzf /tmp/agents-sales-backend-deploy/backend.tgz -C "$APP_DIR"

            docker compose -f "$COMPOSE_FILE" up -d --build sales-backend

            for attempt in $(seq 1 12); do
              HTTP_CODE="$(curl -sS -o /dev/null -w '%{http_code}' "$APP_URL" || true)"
              if [ "$HTTP_CODE" != "000" ]; then
                echo "Healthcheck responded with HTTP $HTTP_CODE"
                exit 0
              fi
              sleep 5
            done

            echo 'Backend healthcheck did not respond in time'
            exit 1
