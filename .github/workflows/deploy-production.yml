name: Notify Infra Deploy (Agents Sales Back)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  notify-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch prod deploy in agents-sales-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
          repository: Germoto/agents-sales-infra
          event-type: agents-sales-back-updated
          client-payload: |
            {"environment":"prod","services":"sales-backend"}
